services:
  postgres:
    image: postgres:17-alpine
    container_name: tau-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tau
      POSTGRES_PASSWORD: tau
      POSTGRES_DB: tau
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tau-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
